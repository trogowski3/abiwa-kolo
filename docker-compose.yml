services:
  app:
    build: .
    container_name: flask_app

    volumes:
      - sqlite_data:/app/data

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:alpine
    container_name: nginx_proxy

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      app:
        condition: service_healthy

volumes:
  sqlite_data:
